baseURL = "https://heroictalesrpg.com/"
languageCode = "en-us"
title = "Heroic Tales"
theme = "ananke"

DefaultContentLanguage = "en"
SectionPagesMenu = "main"
Paginate = 6
googleAnalytics = ""
enableRobotsTXT = true

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  favicon = "images/icon_new_solo@2x.png"
  site_logo = "images/logo_new_h@2x.png"
  description = "A genre-neutral role playing game of heroic problem solving."
  facebook = ""
  twitter = "https://twitter.com/carpedavid"
  instagram = ""
  youtube = ""
  github = ""
  gitlab = ""
  linkedin = ""
  mastodon = ""
  slack = ""
  stackoverflow = ""
  rss = ""
  # choose a background color from any on this page: http://tachyons.io/docs/themes/skins/ and preface it with "bg-"
  background_color_class = "bg-blue"
  featured_image = ""
  recent_posts_number = 2
  body_classes = "garamond black"
  post_content_classes = "garamond black"
  custom_css = ["css/custom.css"]
