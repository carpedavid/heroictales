baseURL = "https://heroictalesrpg.com/"
languageCode = "en-us"
title = "Heroic Tales"
theme = "ananke"

DefaultContentLanguage = "en"
SectionPagesMenu = "main"
Paginate = 6
enableRobotsTXT = true
Copyright = "David Garrett"

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  favicon = "/images/icon_new_solo@2x.png"
  site_logo = "/images/logo_new_h@2x.png"
  site_logo_sm = "/images/logo_new_h@0.5x.png"
  description = "A genre-neutral role playing game of heroic problem solving."
  facebook = ""
  twitter = "https://twitter.com/HeroicTalesRPG"
  instagram = "https://www.instagram.com/heroictalesrpg/"
  youtube = ""
  github = ""
  gitlab = ""
  linkedin = ""
  mastodon = ""
  slack = ""
  stackoverflow = ""
  rss = ""
  # choose a background color from any on this page: http://tachyons.io/docs/themes/skins/ and preface it with "bg-"
  background_color_class = "bg-blue"
  cover_dimming_class = "bg-black-30"
  featured_image = "/images/hero_core_rules.jpg"
  recent_posts_number = 2
  body_classes = "garamond black"
  post_content_classes = "garamond black"
  custom_css = ["css/custom.css"]

[taxonomies]
  tag = "tags"
  category = "categories"
  genre = "genres"
  audience = "audiences"
