baseURL = "/"
title = "Heroic Tales"
languageCode = "en-us"
paginate = "10" # Number of posts per page
theme = "mainroad"
disqusShortname = "" # Enable comments by entering your Disqus shortname
googleAnalytics = "G-R86CCS3ZF1" # Enable Google Analytics by entering your tracking id

[Author]
  name = "Heroic Tales"
  bio = "Heroic Tales is a genre-neutral, rules-light role playing game of heroic problem solving designed for kids, beginners, and regular players who want less crunch and more narrative."
  avatar = "images/icon_new_solo@2x.png"

[Params]
  description = "Heroic Tales is a genre-neutral, rules-light role playing game of heroic problem solving." # Description of your site
  opengraph = true
  twitter_cards = false
  readmore = false # Show "Read more" button in list if true
  authorbox = true
  pager = true
  post_meta = ["date", "categories"] # Order of post meta information

[Params.style.vars]
  highlightColor = "#357edd" # Override highlight color
  
  # Override font-family sets. Secondary font-family set responsible for pre, code, kbd, and samp tags font
  # Take care of different quotes OR escaping symbols in these params if necessary
  fontFamilyPrimary = "'Proxima Nova', sans-serif"
  fontFamilySecondary = "SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"

[Params.logo]
  image = "images/logo_new_h@2x.png"
  subtitle = "Heroic Tales is a genre-neutral, rules-light role playing game of heroic problem solving." # Logo subtitle

[Params.sidebar]
  home = "right"   # Configure layout for home page
  list = "right"   # Configure layout for list pages
  single = false # Configure layout for single pages
  # Enable widgets in given order
  widgets = ["search", "taglist", "social"]

[Params.widgets]
  recent_num = 5 # Set the number of articles in the "Recent articles" widget
  tags_counter = false # Enable counter for each tag in "Tags" widget (disabled by default)

[Params.widgets.social]
  twitter = "heroictalesRPG"
  email = "hello@heroictalesrpg.com"
  instagram = "heroictalesrpg"
  reddit = "heroic_tales"

[taxonomies]
  tag = "tags"
  genre = "genres"
  audience = "audiences"
