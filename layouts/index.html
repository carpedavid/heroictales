{{ define "main" }}
  <article class="pa3 pa4-ns nested-copy-line-height nested-img">
    <section class="cf ph3 ph3-l pv3 pv3-l f4 center measure-wide lh-copy mid-gray">
      {{- .Content -}}
    </section>
    <h1 class="flex-ns flex-wrap justify-around f1">Recent Updates</h1>
    <section class="flex-ns flex-wrap justify-around">
      {{ range .Paginator.Pages }}
        <div class="relative w-100 w-30-l mb2 bg-white">
          {{- partial "summary.html" . -}}
        </div>
      {{ end }}
    </section>
    {{- template "_internal/pagination.html" . -}}
  </article>
{{ end }}
